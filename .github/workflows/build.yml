name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed plugins
        id: changed
        run: |
          echo "=== Changed Files ==="
          git diff --name-only HEAD^ HEAD 2>/dev/null || echo "(first commit or manual trigger)"

          # Memeriksa apakah ada perubahan pada konfigurasi global dasar
          global_change=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            global_change=true
          elif git diff --name-only HEAD^ HEAD 2>/dev/null | grep -qE "^(build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|\.github/)"; then
            global_change=true
          fi

          # Mendata seluruh provider aktif (newline-delimited agar nama dengan spasi aman)
          all_plugins_nl=""
          while IFS= read -r -d '' dir; do
            dir="${dir#./}"
            if [ -f "$dir/build.gradle.kts" ] && [ "$dir" != "buildSrc" ]; then
              all_plugins_nl="$all_plugins_nl$dir\n"
            fi
          done < <(find . -maxdepth 1 -mindepth 1 -type d -print0 | sort -z)

          if [ "$global_change" = "true" ]; then
            echo "Global configuration changed. Rebuilding all plugins."
            plugins_nl="$all_plugins_nl"
          else
            changed_dirs=$(git diff --name-only HEAD^ HEAD 2>/dev/null | awk -F/ '{print $1}' | sort -u)
            plugins_nl=""
            while IFS= read -r dir; do
              [ -z "$dir" ] && continue
              if [ -d "$dir" ] && [ -f "$dir/build.gradle.kts" ] && [ "$dir" != "buildSrc" ]; then
                plugins_nl="$plugins_nl$dir\n"
              fi
            done <<< "$changed_dirs"
          fi

          # Tulis ke file temp agar bisa di-read per baris oleh step berikut
          printf "%b" "$all_plugins_nl" | grep -v '^$' > /tmp/all_plugins.txt
          printf "%b" "$plugins_nl"  | grep -v '^$' > /tmp/plugins.txt

          echo "Plugins to build:"
          cat /tmp/plugins.txt

          # Untuk GITHUB_OUTPUT: encode sebagai newline-separated multiline value
          {
            echo "plugins_file=/tmp/plugins.txt"
            echo "all_plugins_file=/tmp/all_plugins.txt"
          } >> $GITHUB_OUTPUT

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Access Secrets
        env:
          CRUNCHYROLL_BASIC_TOKEN: ${{ secrets.CRUNCHYROLL_BASIC_TOKEN }}
          CRUNCHYROLL_REFRESH_TOKEN: ${{ secrets.CRUNCHYROLL_REFRESH_TOKEN }}
          ANICHI_API: ${{ secrets.ANICHI_API }}
          ANICHI_SERVER: ${{ secrets.ANICHI_SERVER }}
          ANICHI_ENDPOINT: ${{ secrets.ANICHI_ENDPOINT }}
          ANICHI_APP: ${{ secrets.ANICHI_APP }}
          ZSHOW_API: ${{ secrets.ZSHOW_API }}
          SFMOVIES_API: ${{ secrets.SFMOVIES_API }}
          CINEMATV_API: ${{ secrets.CINEMATV_API }}
          GHOSTX_API: ${{ secrets.GHOSTX_API }}
          SUPERSTREAM_FIRST_API: ${{ secrets.SUPERSTREAM_FIRST_API }}
          SUPERSTREAM_SECOND_API: ${{ secrets.SUPERSTREAM_SECOND_API }}
          SUPERSTREAM_THIRD_API: ${{ secrets.SUPERSTREAM_THIRD_API }}
          SUPERSTREAM_FOURTH_API: ${{ secrets.SUPERSTREAM_FOURTH_API }}
        run: |
          echo TMDB_API=${{ secrets.TMDB_API }} >> local.properties
          echo DUMP_API=${{ secrets.DUMP_API }} >> local.properties
          echo DUMP_KEY=${{ secrets.DUMP_KEY }} >> local.properties
          echo FanCode_API=${{ secrets.FanCode_API }} >> local.properties
          echo FlixHQAPI=${{ secrets.FlixHQAPI }} >> local.properties

          echo CRUNCHYROLL_BASIC_TOKEN=$CRUNCHYROLL_BASIC_TOKEN >> local.properties
          echo CRUNCHYROLL_REFRESH_TOKEN=$CRUNCHYROLL_REFRESH_TOKEN >> local.properties

          echo ANICHI_API=$ANICHI_API >> local.properties
          echo ANICHI_SERVER=$ANICHI_SERVER >> local.properties
          echo ANICHI_ENDPOINT=$ANICHI_ENDPOINT >> local.properties
          echo ANICHI_APP=$ANICHI_APP >> local.properties

          echo ZSHOW_API=$ZSHOW_API >> local.properties
          echo SFMOVIES_API=$SFMOVIES_API >> local.properties
          echo CINEMATV_API=$CINEMATV_API >> local.properties
          echo GHOSTX_API=$GHOSTX_API >> local.properties

          echo SUPERSTREAM_FIRST_API=$SUPERSTREAM_FIRST_API >> local.properties
          echo SUPERSTREAM_SECOND_API=$SUPERSTREAM_SECOND_API >> local.properties
          echo SUPERSTREAM_THIRD_API=$SUPERSTREAM_THIRD_API >> local.properties
          echo SUPERSTREAM_FOURTH_API=$SUPERSTREAM_FOURTH_API >> local.properties

      - name: Build Changed Plugins
        run: |
          chmod +x gradlew
          mkdir -p builds

          plugins_file="${{ steps.changed.outputs.plugins_file }}"
          all_plugins_file="${{ steps.changed.outputs.all_plugins_file }}"

          if [ ! -s "$plugins_file" ]; then
            echo "No plugin changes detected."
            exit 0
          fi

          # Restore cached .cs3 untuk plugin yang tidak berubah
          while IFS= read -r plugin; do
            [ -z "$plugin" ] && continue
            if ! grep -qxF "$plugin" "$plugins_file"; then
              if [ -f "builds/${plugin}.cs3" ]; then
                mkdir -p "$plugin/build"
                cp "builds/${plugin}.cs3" "$plugin/build/${plugin}.cs3"
              fi
            fi
          done < "$all_plugins_file"

          # Build plugin yang berubah
          while IFS= read -r plugin; do
            [ -z "$plugin" ] && continue
            echo "=== Building: $plugin ==="
            ./gradlew ":${plugin}:make" --no-daemon || echo "WARN: build failed for $plugin"
            find "$plugin/build" -name "*.cs3" -exec cp {} builds/ \; 2>/dev/null || true
          done < "$plugins_file"

          # Rebuild plugins.json
          ./gradlew makePluginsJson --no-daemon
          cp build/plugins.json builds/

      - name: Commit builds to master
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add builds/
          git commit -m "build: update plugins [skip ci] (${{ github.sha }})" || echo "Nothing to commit"
          git push

      - name: Upload .cs3 to VPS via SCP
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "builds/*.cs3"
          target: "/tmp/cs_builds/"
          strip_components: 1

      - name: Deploy to VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            UPLOAD_DIR="/root/web01.1/apk-uploads"
            updated=0; added=0
            for new_file in /tmp/cs_builds/*.cs3; do
              [ -f "$new_file" ] || continue
              plugin_name=$(basename "$new_file" .cs3)
              old_file=$(ls "$UPLOAD_DIR"/*_"${plugin_name}".cs3 2>/dev/null | tail -1)
              if [ -n "$old_file" ]; then
                cp "$new_file" "$old_file"; updated=$((updated+1))
              else
                ts=$(date +%s)000
                cp "$new_file" "$UPLOAD_DIR/${ts}_${plugin_name}.cs3"; added=$((added+1))
              fi
            done
            rm -rf /tmp/cs_builds
            echo "Done: $updated updated, $added new"
