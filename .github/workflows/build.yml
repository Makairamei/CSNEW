name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - "builds/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Access Secrets
        env:
          GHOSTX_API: ${{ secrets.GHOSTX_API }}
          SUPERSTREAM_FIRST_API: ${{ secrets.SUPERSTREAM_FIRST_API }}
          SUPERSTREAM_SECOND_API: ${{ secrets.SUPERSTREAM_SECOND_API }}
          SUPERSTREAM_THIRD_API: ${{ secrets.SUPERSTREAM_THIRD_API }}
          SUPERSTREAM_FOURTH_API: ${{ secrets.SUPERSTREAM_FOURTH_API }}
        run: |
          echo "GHOSTX_API=${GHOSTX_API:-}" >> local.properties
          echo "SUPERSTREAM_FIRST_API=${SUPERSTREAM_FIRST_API:-}" >> local.properties
          echo "SUPERSTREAM_SECOND_API=${SUPERSTREAM_SECOND_API:-}" >> local.properties
          echo "SUPERSTREAM_THIRD_API=${SUPERSTREAM_THIRD_API:-}" >> local.properties
          echo "SUPERSTREAM_FOURTH_API=${SUPERSTREAM_FOURTH_API:-}" >> local.properties

      - name: Build All Plugins
        run: |
          set +e
          chmod +x gradlew
          mkdir -p builds

          # List all plugin directories (with build.gradle.kts)
          PLUGINS=()
          for dir in */; do
            dir="${dir%/}"
            [ "$dir" = "buildSrc" ] && continue
            [ -f "$dir/build.gradle.kts" ] || continue
            PLUGINS+=("$dir")
          done

          echo "Total plugins to build: ${#PLUGINS[@]}"
          ok=0; fail=0
          for plugin in "${PLUGINS[@]}"; do
            echo "::group::Building $plugin"
            if ./gradlew ":${plugin}:make" --no-daemon --console=plain 2>&1 | tail -50; then
              # find the .cs3 produced
              cs3=$(find "$plugin/build" -name "*.cs3" 2>/dev/null | head -1)
              if [ -n "$cs3" ]; then
                cp "$cs3" "builds/${plugin}.cs3"
                ok=$((ok+1))
                echo "OK: builds/${plugin}.cs3 ($(wc -c < "builds/${plugin}.cs3") bytes)"
              else
                fail=$((fail+1))
                echo "FAIL: no .cs3 produced for $plugin"
              fi
            else
              fail=$((fail+1))
              echo "FAIL: gradle returned error for $plugin"
            fi
            echo "::endgroup::"
          done

          echo "=== Build summary: $ok ok, $fail failed ==="

          # Generate plugins.json (best-effort)
          ./gradlew makePluginsJson --no-daemon --console=plain || echo "makePluginsJson failed (non-fatal)"
          if [ -f build/plugins.json ]; then
            cp build/plugins.json builds/plugins.json
          fi

          # Always exit 0 — partial builds OK
          exit 0

      - name: Commit builds to master
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add builds/
          git commit -m "build: update plugins [skip ci] (${{ github.sha }})" || echo "Nothing to commit"
          git push

      - name: Upload .cs3 to VPS via SCP
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "builds/*.cs3"
          target: "/tmp/cs_builds/"
          strip_components: 1

      - name: Deploy to VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            UPLOAD_DIR="/root/web01.1/apk-uploads"
            updated=0; added=0
            for new_file in /tmp/cs_builds/*.cs3; do
              [ -f "$new_file" ] || continue
              plugin_name=$(basename "$new_file" .cs3)
              old_file=$(ls "$UPLOAD_DIR"/*_"${plugin_name}".cs3 2>/dev/null | tail -1)
              if [ -n "$old_file" ]; then
                cp "$new_file" "$old_file"; updated=$((updated+1))
              else
                ts=$(date +%s)000
                cp "$new_file" "$UPLOAD_DIR/${ts}_${plugin_name}.cs3"; added=$((added+1))
              fi
            done
            rm -rf /tmp/cs_builds
            echo "Done: $updated updated, $added new"
